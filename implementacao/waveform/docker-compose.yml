version: '3.8'

services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: postgres-custom
    restart: unless-stopped
    environment:
      POSTGRES_USER: fei
      POSTGRES_PASSWORD: fei
      POSTGRES_DB: maindb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fei -d maindb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
